name: Update macro data (daily)

on:
  schedule:
    # 00:00 UTC = 09:00 KST, weekdays (Mon–Fri)
    - cron: "0 0 * * 1-5"
  workflow_dispatch: {}   # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write          # needed to commit public/data.json back to the repo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Fetch latest market data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/update_data.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          if git diff --staged --quiet; then
            echo "No data changes today."
          else
            git commit -m "chore: daily macro data update ($(date -u +%Y-%m-%d))"
            git push
          fi
