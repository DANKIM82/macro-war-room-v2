name: Update macro data (daily)

on:
  schedule:
    # 00:00 UTC = 09:00 KST, weekdays (Mon–Fri)
    - cron: "0 0 * * 1-5"
  workflow_dispatch: {}   # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write          # needed to commit public/data.json back to the repo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests yfinance anthropic

      - name: Fetch latest market data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/update_data.py

      - name: Generate news + AI analysis
        continue-on-error: true   # an LLM/news hiccup must not block the data update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_analysis.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json analysis.json
          if git diff --staged --quiet; then
            echo "No data changes today."
          else
            git commit -m "chore: daily macro data + analysis update ($(date -u +%Y-%m-%d))"
            git push
          fi
