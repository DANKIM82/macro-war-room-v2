function untilLabel(iso,now){
  if(!iso)return"TBD";const t=new Date(iso).getTime();if(isNaN(t))return"TBD";
  let s=Math.floor((t-now.getTime())/1000);if(s<=0)return"due";
  const d=Math.floor(s/86400);if(d>=1)return"in "+d+"d";
  const h=Math.floor(s/3600);if(h>=1)return"in "+h+"h";
  return"in "+Math.max(1,Math.floor(s/60))+"m";
}
function Countdown({iso,now}){
  if(!iso)return<span style={{color:"#4a5568",fontFamily:"JetBrains Mono,monospace"}}>TBD</span>;
  const t=new Date(iso).getTime();if(isNaN(t))return<span style={{color:"#4a5568"}}>TBD</span>;
  let diff=Math.floor((t-now.getTime())/1000);
  if(diff<=0)return<span style={{color:"#22d3a8",fontFamily:"JetBrains Mono,monospace",fontWeight:700}}>LIVE</span>;
  const d=Math.floor(diff/86400);diff-=d*86400;
  const h=Math.floor(diff/3600);diff-=h*3600;
  const m=Math.floor(diff/60);const s=diff-m*60;
  const p=n=>String(n).padStart(2,"0");
  return(<span style={{fontFamily:"JetBrains Mono,monospace",fontSize:"clamp(22px,5vw,36px)",
      fontWeight:700,color:"#F0F2F8",letterSpacing:"-.02em",fontVariantNumeric:"tabular-nums",
      display:"inline-flex",gap:6,alignItems:"baseline"}}>
    {d>0&&<em style={{fontStyle:"normal"}}>{d}<i style={{fontStyle:"normal",fontSize:10,color:"#4a5568",marginLeft:1}}>d</i></em>}
    <em style={{fontStyle:"normal"}}>{p(h)}<i style={{fontStyle:"normal",fontSize:10,color:"#4a5568",marginLeft:1}}>h</i></em>
    <em style={{fontStyle:"normal"}}>{p(m)}<i style={{fontStyle:"normal",fontSize:10,color:"#4a5568",marginLeft:1}}>m</i></em>
    <em style={{fontStyle:"normal"}}>{p(s)}<i style={{fontStyle:"normal",fontSize:10,color:"#4a5568",marginLeft:1}}>s</i></em>
  </span>);
}
function fmtVal(row,v){
  if(v==null)return"—";if(row.eq)return eqFmt(v);
  if(row.type==="slope")return(v>0?"+":"")+Math.round(v);
  return Number(v).toFixed(row.dp);
}
function calcDelta(row){
  const d=row.now-row.y1;
  if(row.eq){const p=(d/row.y1*100);return{raw:p,str:(p>0?"+":"")+p.toFixed(1)+"%"};}
  if(row.type==="slope")return{raw:d,str:(d>0?"+":"")+Math.round(d)+" bps"};
  return{raw:d,str:(d>0?"+":"")+Number(d).toFixed(row.dp)+(row.dp>0?"%":"")};
}
function deltaColor(type,val,isEq){
  if(Math.abs(val)<0.001)return"#4a5568";const pos=val>0;
  if(isEq)return pos?"#22d3a8":"#FF3B55";
  if(type==="rate")return pos?"#FF3B55":"#22d3a8";
  if(type==="slope")return pos?"#22d3a8":"#FF3B55";
  if(type==="cpi")return pos?"#FF3B55":"#22d3a8";
  return pos?"#22d3a8":"#FF3B55";
}

/* ════════════════════════════════════════════════════════════════════
   LIVE DATA OVERLAY  — merges public/data.json (refreshed daily) onto
   the static board/signals. Falls back to static when data.json absent.
   ════════════════════════════════════════════════════════════════════ */
const EQ_KEY={US:"SPX",JP:"Nikkei",KR:"KOSPI",CN:"CSI300",EU:"EuroStoxx",GB:"FTSE"};
const US_KEY={"Policy Rate":"policyRate","2Y Yield":"y2","10Y Yield":"y10","CPI y/y":"cpiYoY","GDP y/y":"gdpYoY"};
const KR_KEY={
"Policy Rate":["policyRate",null,null,"policyRate_m1","policyRate_y1"],
"2Y Yield": ["y2","y2_d1","y2_w1","y2_m1","y2_y1"],
"10Y Yield": ["y10","y10_d1","y10_w1","y10_m1","y10_y1"],
"2s10s": ["slope","slope_d1","slope_w1","slope_m1","slope_y1"],
"CPI y/y": ["cpiYoY",null,null,"cpiYoY_m1","cpiYoY_y1"],
"GDP y/y": ["gdpYoY",null,null,"gdpYoY_q1","gdpYoY_y1"],
};
const liveNum=v=>(v!=null&&!isNaN(v))?Number(v):null;
function mergeBoard(live){
if(!live)return BOARD;
const kr=live.kr||{};
return BOARD.map(c=>{
let rows=c.rows.map(r=>{
if(r.eq){
const nv=liveNum(live.equities?.[EQ_KEY[c.code]]);
return nv!=null?{...r,now:nv,live:true}:r;
}
if(c.code==="US"&&US_KEY[r.k]){
const nv=liveNum(live.us?.[US_KEY[r.k]]);
return nv!=null?{...r,now:nv,live:true}:r;
}
if(c.code==="KR"&&KR_KEY[r.k]){
const [k0,k1,k2,k3,k4]=KR_KEY[r.k];
const nv =k0?liveNum(kr[k0]):null;
const nd1=k1?liveNum(kr[k1]):null;
const nw1=k2?liveNum(kr[k2]):null;
const nm1=k3?liveNum(kr[k3]):null;
const ny1=k4?liveNum(kr[k4]):null;
const patch={};
if(nv !=null){patch.now=nv;patch.live=true;}
if(nd1!=null)patch.d1=nd1;
if(nw1!=null)patch.w1=nw1;
if(nm1!=null)patch.m1=nm1;
if(ny1!=null)patch.y1=ny1;
return Object.keys(patch).length>0?{...r,...patch}:r;
}
return r;
});
if(c.code==="US"){
const y2=rows.find(r=>r.k==="2Y Yield"),y10=rows.find(r=>r.k==="10Y Yield");
if(y2?.live&&y10?.live){
const slope=Math.round((y10.now-y2.now)*100);
rows=rows.map(r=>r.k==="2s10s"?{...r,now:slope,live:true}:r);
}
}
return {...c,rows};
});
}
function mergeSignals(live,analysis){
  const notes={};
  (analysis?.signalNotes||[]).forEach(n=>{if(n&&n.name)notes[n.name]=n.note;});
  const c=live?.commodities,fx=live?.fx;
  return SIGNALS.map(s=>{
    let val=s.val;
    if(s.name==="USD / KRW"&&fx?.USDKRW!=null)val=Number(fx.USDKRW).toLocaleString("en-US");
    else if(s.name==="Brent Crude"&&c?.brent!=null)val="$"+Math.round(c.brent);
    else if(s.name==="Gold"&&c?.gold!=null)val="$"+Math.round(c.gold).toLocaleString("en-US");
    else if(s.name==="VIX"&&c?.vix!=null)val="~"+Number(c.vix).toFixed(0);
    return {...s,val,note:notes[s.name]||s.note};
  });
}

/* ════════════════════════════════════════════════════════════════════
   AI PROMPTS
   ════════════════════════════════════════════════════════════════════ */
function buildMetricPrompt(country,row){
  const snap=country.rows.map(r=>`  ${r.k}: ${fmtVal(r,r.now)} (1Y: ${fmtVal(r,r.y1)})`).join("\n");
  const cur=`${fmtVal(row,row.now)}${row.type==="slope"?" bps":row.dp>0?"%":""}`;
  const dlt=calcDelta(row);
  return `You are a senior macro PM at a $50bn global macro hedge fund. Today is June 7, 2026.

COUNTRY DATA — ${country.name}:
${snap}

GLOBAL CONTEXT: Iran-US war since Sep 2025 (oil $95), AI supercycle (SK Hynix/Samsung HBM dominance), Fed at 3.75% with hike risk, May NFP +172K vs est +88K (SPX -2.6%), USDKRW 1,555 (15Y high), USDJPY 160.

Write a sharp 3-paragraph trade-desk commentary on ${country.name} ${row.k} (now: ${cur}, Δ1Y: ${dlt.str}).

Para 1: Drivers of the current level and trend
Para 2: Monetary policy + cross-asset implications
Para 3: Near-term outlook, key risk, and positioning bias

▸ Equity Implication: [specific sectors/names/factors — be precise]

Style: PM-to-team voice note — direct, opinionated, no hedging. 250 words max.`;
}

function buildTradePrompt(trade){
  return `You are a senior PM at a top global macro hedge fund presenting to the investment committee. Today is June 7, 2026.

PROPOSED TRADE:
Direction: ${trade.dir}
Asset: ${trade.asset}
Tag: ${trade.tag}
Entry: ${trade.entry}
Target: ${trade.target}
Stop: ${trade.stop}
Timeline: ${trade.timeline}
Conviction: ${trade.conv}/5 stars

Core Thesis: ${trade.thesis}

Key Catalyst: ${trade.catalyst}

GLOBAL CONTEXT: Iran war (oil $95), Fed at 3.75% with hike risk, NFP +172K big beat, CPI 3.8% re-accelerating, AI supercycle intact (KR/JP semis), USDKRW at 15Y high, USDJPY at 160.

Write a crisp investment committee trade memo:

1. THE EDGE: Why this trade now? What does the market mis-price?
2. ENTRY & STRUCTURE: How to express it (cash, futures, options structure)?
3. THREE RISKS: What kills the trade? Be specific.
4. SIZING GUIDANCE: How large? What's the Kelly criterion? Correlation to book?

▸ Committee Verdict: [one sentence — approve/reduce/monitor + rationale]

Style: Millennium/Citadel IC memo — blunt, quantitative, no narrative fluff. 300 words max.`;
}

.bsub{font-size:8px;color:var(--dim);margin-top:2px}
.bdelta{font-weight:700}
.gbtn{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--dim);
  background:none;border:1px solid var(--b);padding:3px 8px;border-radius:6px;
  cursor:pointer;transition:.15s;white-space:nowrap}
.gbtn:hover{border-color:var(--purple);color:var(--purple);background:rgba(167,139,250,.08)}
/* AI DRAWER */
.overlay{position:fixed;inset:0;background:rgba(40,35,23,.45);z-index:300;
  display:flex;flex-direction:column;justify-content:flex-end;animation:ov-in .2s}
.drawer{background:#F7F1E3;border:1px solid rgba(60,48,24,.2);
  border-top-left-radius:22px;border-top-right-radius:22px;
  padding:14px 20px 36px;max-height:82vh;overflow-y:auto;
  animation:dr-in .3s cubic-bezier(.32,.72,0,1)}
.dhandle{width:36px;height:4px;background:rgba(60,48,24,.22);
  border-radius:2px;margin:0 auto 16px}
.dhdr{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:18px}
.dbadge-metric{font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:700;
  letter-spacing:.15em;text-transform:uppercase;color:var(--green);
  background:rgba(34,211,168,.1);border:1px solid rgba(34,211,168,.3);
  padding:4px 10px;border-radius:20px;display:inline-block}
.dbadge-trade{font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:700;
  letter-spacing:.15em;text-transform:uppercase;color:var(--purple);
  background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.3);
  padding:4px 10px;border-radius:20px;display:inline-block}
.dtitle{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.04em;margin-top:8px}
.dsub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--mt);margin-top:4px}
.dclose{font-size:19px;color:var(--dim);background:none;border:none;cursor:pointer;
  padding:4px 8px;transition:.12s;flex:none}
.dclose:hover{color:var(--t)}
.dbody{font-family:'Nunito Sans',sans-serif;font-size:13.5px;line-height:1.78;
  color:var(--t);white-space:pre-wrap;min-height:40px}
.dcur{display:inline-block;width:2px;height:15px;background:var(--orange);
  margin-left:2px;vertical-align:middle;animation:blink .7s step-end infinite}
.deq{background:rgba(255,98,0,.08);border-left:3px solid var(--orange);
  padding:12px 15px;border-radius:0 10px 10px 0;margin-top:18px;
  font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--orange);line-height:1.65}
.dloading{display:flex;align-items:center;gap:9px;padding:26px 0}
.ldot{width:8px;height:8px;border-radius:50%;background:var(--orange);
  animation:dotp 1.3s ease-in-out infinite}
.llbl{font-family:'JetBrains Mono',monospace;font-size:10px;
  letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-left:4px}
/* FOOTER */
.foot{margin-top:24px;font-size:10px;color:var(--dim);line-height:1.7;
  font-family:'Nunito Sans',sans-serif;display:flex;justify-content:space-between;
  gap:14px;flex-wrap:wrap;border-top:1px solid var(--b);padding-top:16px}
.foot b{color:var(--mt)}
/* KEYFRAMES */
@keyframes pulse-o{0%,100%{box-shadow:0 0 0 0 rgba(255,98,0,.5)}60%{box-shadow:0 0 0 7px rgba(255,98,0,0)}}
@keyframes fadeup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes blink{50%{opacity:0}}
@keyframes dotp{0%,80%,100%{transform:scale(.55);opacity:.3}40%{transform:scale(1);opacity:1}}
@keyframes ov-in{from{opacity:0}to{opacity:1}}
@keyframes dr-in{from{transform:translateY(100%)}to{transform:translateY(0)}}
/* HEADER ACTIONS / PDF */
.hdr-actions{display:flex;align-items:center;gap:10px}
.data-status{display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;
  font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
.data-status.on{color:var(--green)}
.ds-dot{width:6px;height:6px;border-radius:50%;background:var(--dim)}
.data-status.on .ds-dot{background:var(--green);box-shadow:0 0 6px rgba(14,158,120,.6)}
.pdf-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;padding:6px 13px;background:rgba(226,86,0,.1);color:var(--orange);
  border:1px solid rgba(226,86,0,.4);border-radius:8px;cursor:pointer;transition:.15s}
.pdf-btn:hover{background:rgba(226,86,0,.2);border-color:var(--orange)}
/* PRINT (PDF export) */
@media print{
  @page{margin:10mm;size:A4 portrait}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .pdf-btn,.analyze-btn,.gbtn,.overlay,.drawer,.live-clock{display:none!important}
  .wr{background:#fff!important;min-height:0}
  .wi{max-width:none;padding:0}
  .sig-strip{flex-wrap:wrap;overflow:visible}
  .radar-panel,.nfp-panel,.board-shell,.cal-card,.trade-card,.sig-card,.cal-deck{
    break-inside:avoid;page-break-inside:avoid}
  .sec{break-after:avoid}
}
`;

/* ════════════════════════════════════════════════════════════════════
   REGIME RADAR COMPONENT

const RadarTick = ({ x, y, payload }) => (
  <text x={x} y={y} textAnchor="middle" dominantBaseline="middle"
    fill="#8892a4" fontSize={9} fontFamily="JetBrains Mono,monospace" letterSpacing="0.05em">
    {payload.value}
  </text>
);

function RegimeRadar() {
  return (
    <div className="radar-panel">
      <div className="radar-title">MACRO REGIME RADAR</div>
      <ResponsiveContainer width="100%" height={240}>
        <RadarChart data={REGIME} margin={{top:10,right:30,bottom:10,left:30}}>
          <PolarGrid gridType="polygon" stroke="rgba(60,48,24,.14)" radialLines={false}/>
          <PolarAngleAxis dataKey="axis" tick={<RadarTick/>}/>
          <PolarRadiusAxis domain={[0,10]} tick={false} axisLine={false}/>
          <Radar name="Now" dataKey="current" stroke="#FF6200" fill="#FF6200"
            fillOpacity={0.2} strokeWidth={2} dot={{fill:"#FF6200",r:3}}/>
          <Radar name="6M Ago" dataKey="prior" stroke="rgba(60,48,24,.4)"
            fill="rgba(60,48,24,.07)" strokeWidth={1.5} strokeDasharray="5 4"
            dot={{fill:"rgba(60,48,24,.45)",r:2.5}}/>
          <Tooltip
            contentStyle={{background:"#101018",border:"1px solid rgba(255,255,255,.15)",
              borderRadius:8,fontFamily:"JetBrains Mono,monospace",fontSize:11}}

            formatter={(v,n)=>[v.toFixed(1)+"/10",n]}
          />
        </RadarChart>
      </ResponsiveContainer>
      <div className="radar-legend">
        <span className="rl">
          <svg width={20} height={2}><line x1={0} y1={1} x2={20} y2={1} stroke="#FF6200" strokeWidth={2}/></svg>
          Now (Jun '26)
        </span>
        <span className="rl">
          <svg width={20} height={2}><line x1={0} y1={1} x2={20} y2={1} stroke="rgba(60,48,24,.4)" strokeWidth={1.5} strokeDasharray="4 3"/></svg>
          6M Ago (Dec '25)
        </span>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════
   NFP CHART COMPONENT
   ════════════════════════════════════════════════════════════════════ */
function NFPChart() {
  const lat=NFP[NFP.length-1];
  const avg=Math.round(NFP.reduce((s,d)=>s+d.surp,0)/NFP.length);
  const Tip=({active,payload,label})=>{
    if(!active||!payload?.length)return null;
    const d=NFP.find(x=>x.mo===label);if(!d)return null;
    return(<div style={{background:"#101018",border:"1px solid rgba(255,255,255,.15)",
        borderRadius:10,padding:"10px 14px",fontFamily:"JetBrains Mono,monospace",fontSize:11,minWidth:150}}>
      <div style={{color:"#FF6200",fontWeight:700,marginBottom:6}}>{label}</div>
      <div style={{color:"#F0F2F8"}}>Act <b>{d.a}K</b> · Est {d.e}K</div>
      <div style={{color:d.surp>=0?"#22d3a8":"#FF3B55",fontWeight:700,marginTop:2}}>{d.surp>=0?"+":""}{d.surp}K surprise</div>
      <div style={{color:d.spx>=0?"#22d3a8":"#FF3B55",marginTop:4}}>SPX {d.spx>=0?"+":""}{d.spx}%</div>
      {d.note&&<div style={{color:"#4a5568",marginTop:5,fontSize:9.5,lineHeight:1.4}}>{d.note}</div>}
    </div>);
  };
  return(<div className="nfp-panel">
    <div className="nfp-stats">
      <div className="nstat"><span className="nstat-k">Latest May '26</span><span className="nstat-v" style={{color:"#22d3a8"}}>+{lat.a}K</span></div>
      <div className="nstat"><span className="nstat-k">vs estimate</span><span className="nstat-v" style={{color:"#FF6200"}}>+{lat.surp}K</span></div>
      <div className="nstat"><span className="nstat-k">SPX day-of</span><span className="nstat-v" style={{color:"#FF3B55"}}>{lat.spx}%</span></div>
      <div className="nstat"><span className="nstat-k">3Y avg surprise</span><span className="nstat-v">{avg>=0?"+":""}{avg}K</span></div>
    </div>
    <div style={{width:"100%",height:200}}>
      <ResponsiveContainer>
        <ComposedChart data={NFP} margin={{top:4,right:44,left:-16,bottom:0}}>
          <CartesianGrid strokeDasharray="2 5" stroke="rgba(60,48,24,.1)" vertical={false}/>
          <XAxis dataKey="mo" tick={{fill:"#4a5568",fontSize:8.5,fontFamily:"JetBrains Mono,monospace"}} tickLine={false} interval={4}/>
          <YAxis yAxisId="l" tick={{fill:"#4a5568",fontSize:8.5,fontFamily:"JetBrains Mono,monospace"}} tickLine={false} tickFormatter={v=>v+"K"} domain={["auto","auto"]}/>
          <YAxis yAxisId="r" orientation="right" tick={{fill:"#4a5568",fontSize:8.5,fontFamily:"JetBrains Mono,monospace"}} tickLine={false} tickFormatter={v=>v+"%"}/>
          <Tooltip content={<Tip/>}/>
          <ReferenceLine yAxisId="l" y={0} stroke="rgba(60,48,24,.28)" strokeWidth={1}/>
          <Bar yAxisId="l" dataKey="surp" maxBarSize={12} radius={[2,2,0,0]}>
            {NFP.map((d,i)=><Cell key={i} fill={d.surp>=0?"#22d3a8":"#FF3B55"} fillOpacity={0.7}/>)}
          </Bar>
          <Line yAxisId="r" type="monotone" dataKey="spx" stroke="#FF6200" strokeWidth={1.5} dot={false} activeDot={{r:3,fill:"#FF6200"}}/>
        </ComposedChart>
      </ResponsiveContainer>
    </div>
    <div className="nfp-leg">
      <span className="nleg"><span style={{width:10,height:10,borderRadius:3,background:"#22d3a8",opacity:.7,display:"inline-block"}}/> Surprise +</span>
      <span className="nleg"><span style={{width:10,height:10,borderRadius:3,background:"#FF3B55",opacity:.7,display:"inline-block"}}/> Surprise −</span>
      <span className="nleg"><span style={{width:14,height:2,background:"#FF6200",display:"inline-block",borderRadius:1}}/> SPX Day %</span>
    </div>
  </div>);
}

/* ════════════════════════════════════════════════════════════════════
   AI ANALYSIS DRAWER
   ════════════════════════════════════════════════════════════════════ */
function AnalysisDrawer({open,onClose,info,state}){
  if(!open||!info)return null;
  const text=state?.content||"";
  const eqIdx=text.indexOf("\u25b8");
  const main=eqIdx!==-1?text.slice(0,eqIdx).trim():text;
  const eq=eqIdx!==-1?text.slice(eqIdx).trim():null;
  const loading=state?.loading??true;
  const done=state?.done??false;
  return(<div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="drawer">
      <div className="dhandle"/>
      <div className="dhdr">
        <div>
          <span className={info.type==="trade"?"dbadge-trade":"dbadge-metric"}>
            {info.type==="trade"?"Hedge Fund Trade Memo":"Macro Research"}
          </span>
          <div className="dtitle">{info.title}</div>
          <div className="dsub">{info.subtitle}</div>
        </div>
        <button className="dclose" onClick={onClose}>\u00d7</button>
      </div>
      {loading&&!text?(
        <div className="dloading">
          {[0,1,2].map(i=><div key={i} className="ldot" style={{animationDelay:i*.18+"s"}}/>)}
          <span className="llbl">Generating</span>
        </div>
      ):(
        <>
          <div className="dbody">{main}{!done&&text&&<span className="dcur"/>}</div>
          {eq&&<div className="deq">{eq}</div>}
        </>
      )}
    </div>
  </div>);
}

/* ════════════════════════════════════════════════════════════════════
   RATES MATRIX
   ════════════════════════════════════════════════════════════════════ */
function RatesMatrix({onAnalyze,board=BOARD}){
  const [sel,setSel]=useState(0);
  const C=board[sel];
  return(<>
    <div className="board-shell">
      <div className="btabs">
        {board.map((c,i)=>(
          <button key={c.code} className={"btab"+(sel===i?" on":"")} onClick={()=>setSel(i)}>{c.code}</button>
        ))}
      </div>
      <div className="bhdr">
        <div className="bcountry">{C.name}</div>
        <div className="breg">{C.region}</div>
      </div>
      <div className="bscroll">
        <table className="btbl">
          <thead><tr>
            <th className="l">Metric</th>
            <th className="hn">Now</th>
            <th>1D ago</th><th>1W ago</th><th>1M ago</th><th>1Y ago</th>
            <th>\u0394 1Y</th><th></th>
          </tr></thead>
          <tbody>
            {C.rows.map(row=>{
              const dlt=calcDelta(row);
              const dc=deltaColor(row.type,dlt.raw,row.eq);
              return(<tr key={row.k} onClick={()=>onAnalyze("metric",C,row)}>
                <td className="l"><div className="bmet">{row.k}</div>{row.sub&&<div className="bsub">{row.sub}</div>}</td>
                <td className="hnow">{fmtVal(row,row.now)}</td>
                <td style={{color:"#8892a4"}}>{fmtVal(row,row.d1)}</td>
                <td style={{color:"#8892a4"}}>{fmtVal(row,row.w1)}</td>
                <td style={{color:"#8892a4"}}>{fmtVal(row,row.m1)}</td>
                <td style={{color:"#4a5568"}}>{fmtVal(row,row.y1)}</td>
                <td><span className="bdelta" style={{color:dc}}>{dlt.str}</span></td>
                <td><button className="gbtn" onClick={e=>{e.stopPropagation();onAnalyze("metric",C,row);}}>AI \u25b7</button></td>
              </tr>);
            })}
          </tbody>
        </table>
      </div>
    </div>
    <div style={{fontSize:9.5,color:"var(--dim)",fontFamily:"Nunito Sans,sans-serif",
        lineHeight:1.6,marginBottom:26,paddingLeft:2,marginTop:6}}>
      Tap any row for AI analysis · ~ = estimated · \u0394: rate\u2191=red(hawkish) · price\u2191=green · CPI\u2191=red
    </div>
  </>);
}

/* ════════════════════════════════════════════════════════════════════
   APP
   ════════════════════════════════════════════════════════════════════ */
function App(){
  const [clock,setClock]=useState(new Date());
  const [openA,setOpenA]=useState(null);
  const [analyses,setAnalyses]=useState({});
  const [live,setLive]=useState(null);
  const [analysis,setAnalysis]=useState(null);
  const timerRef=useRef(null);

  useEffect(()=>{const t=setInterval(()=>setClock(new Date()),1000);return()=>clearInterval(t);},[]);

  // Daily-refreshed data — written by scripts/update_data.py + update_analysis.py (GitHub Actions cron)
  useEffect(()=>{
    fetch('./data.json',{cache:"no-store"})
      .then(r=>r.ok?r.json():null).then(d=>{if(d)setLive(d);}).catch(()=>{});
    fetch('./analysis.json',{cache:"no-store"})
      .then(r=>r.ok?r.json():null).then(a=>{if(a)setAnalysis(a);}).catch(()=>{});
  },[]);

  const liveBoard=mergeBoard(live);
  const liveSignals=mergeSignals(live,analysis);
  const regimeLabel=analysis?.regimeLabel||REGIME_LABEL;
  const regimeSub=analysis?.regimeSub||REGIME_SUB;
  const themes=(analysis?.themes&&analysis.themes.length)?analysis.themes:THEMES;

  // Export the current dashboard as a dated PDF (browser print → Save as PDF)
  function exportPDF(){
    const d=new Date();
    const stamp=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const prev=document.title;
    document.title=`MacroWarRoom_${stamp}`;
    window.print();
    setTimeout(()=>{document.title=prev;},800);
  }

  function startTypewriter(text,key){
    if(timerRef.current)clearInterval(timerRef.current);
    let i=0;
    timerRef.current=setInterval(()=>{
      i=Math.min(i+22,text.length);
      const done=i>=text.length;
      setAnalyses(p=>({...p,[key]:{loading:false,content:text.slice(0,i),done}}));
      if(done){clearInterval(timerRef.current);timerRef.current=null;}
    },14);
  }

  async function handleAnalyze(type,country,rowOrTrade){
    const key=type==="trade"?`trade_${rowOrTrade.id}`:`${country.code}_${rowOrTrade.k}`;
    const info = type==="trade"
      ? {type:"trade",title:rowOrTrade.dir+" "+rowOrTrade.asset,subtitle:rowOrTrade.tag+" · Jun 7, 2026"}
      : {type:"metric",title:country.name+" · "+rowOrTrade.k,
          subtitle:fmtVal(rowOrTrade,rowOrTrade.now)+(rowOrTrade.type==="slope"?" bps":rowOrTrade.dp>0?"%":"")+" · Jun 7, 2026"};
    setOpenA({key,info});
    if(analyses[key]?.done)return;
    if(timerRef.current){clearInterval(timerRef.current);timerRef.current=null;}
    setAnalyses(p=>({...p,[key]:{loading:true,content:"",done:false}}));
    const prompt=type==="trade"?buildTradePrompt(rowOrTrade):buildMetricPrompt(country,rowOrTrade);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
          messages:[{role:"user",content:prompt}]})
      });
      if(!res.ok){const t=await res.text();throw new Error("HTTP "+res.status+": "+t.slice(0,120));}
      const data=await res.json();
      const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
      if(!text)throw new Error("Empty response");
      startTypewriter(text,key);
    }catch(err){
      setAnalyses(p=>({...p,[key]:{loading:false,content:"\u26a0 "+err.message,done:true}}));
    }
  }

  const sortedCal=[...CAL].sort((a,b)=>tval(a)-tval(b));
  const onDeck=sortedCal.find(it=>tval(it)>clock.getTime())||sortedCal[0];

  return(<>
    <style>{CSS}</style>
    <div className="wr">
      <div className="wi">

        {/* HEADER */}
        <header className="hdr">
          <div className="hdr-l">
            <div className="logo">MACRO<span>WAR</span>ROOM</div>
            <div className="tagline">Global Macro Strategy · Jun 7, 2026</div>
          </div>
          <div className="hdr-r">
            <div className="live-clock">
              <b>{clock.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"})}</b>{" "}
              {clock.toLocaleDateString([],{weekday:"short",month:"short",day:"numeric"})}
            </div>
            <div className="hdr-actions">
              <span className={"data-status"+((live||analysis)?" on":"")} title={analysis?.headline||(live?`Updated ${live.updated||live.date}`:"Using built-in static data")}>
                <span className="ds-dot"/>{analysis?`AI · ${analysis.asOf||analysis.generated||"live"}`:live?`DATA · ${live.date||"live"}`:"STATIC DATA"}
              </span>
              <button className="pdf-btn" onClick={exportPDF} title="오늘 화면을 PDF로 저장">⬇ PDF</button>
            </div>
          </div>
        </header>

        {/* REGIME BAR */}
        <div className="regime-bar">
          <div className="regime-badge">
            <div className="regime-dot"/>
            {regimeLabel}
          </div>
          <div className="regime-sub">{regimeSub}</div>
        </div>

        {/* REGIME RADAR + THEMES */}
        <div className="sec">Regime Analysis</div>
        <div className="radar-grid">
          <RegimeRadar/>
          <div className="radar-panel">
            <div className="radar-title">KEY THEMES</div>
            <div className="theme-list">
              {themes.map((t,i)=>(
                <div className="theme-item" key={i}>
                  <span className="theme-num">0{i+1}</span>
                  <span className="theme-txt">{t}</span>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* SIGNAL STACK */}
        <div className="sec">Cross-Asset Signals</div>
        <div className="sig-strip">
          {liveSignals.map((s,i)=>(
            <div className="sig-card" key={s.name} style={{animationDelay:i*.05+"s",borderTopColor:s.col,borderTopWidth:2}}>
              <div className="sig-name">{s.name}</div>
              <div>
                <div className="sig-val" style={{color:s.col}}>{s.val}
                  <span className="sig-dir" style={{color:s.col}}>{s.dir}</span>
                </div>
              </div>
              <div className="pct-wrap">
                <div className="pct-bar-bg">
                  <div className="pct-bar-fill" style={{width:s.pct+"%",background:s.col,opacity:.75}}/>
                </div>
                <div className="pct-label">
                  <span>{s.pct}th pct</span>
                  <span style={{color:"#4a5568"}}>15Y hist</span>
                </div>
              </div>
              <div className="sig-note">{s.note}</div>
            </div>
          ))}
        </div>

        {/* CATALYST CALENDAR */}
        <div className="sec">Upcoming Catalysts</div>
        {onDeck&&(<div className="cal-deck">
          <div>
            <div className="cal-tag">On deck · next print</div>
            <div className="cal-name">{onDeck.name}</div>
            <div className="cal-meta">{onDeck.nl}{"  ·  est "}{onDeck.con}{"  ·  prior "}{onDeck.pr}</div>
          </div>
          <Countdown iso={onDeck.ni} now={clock}/>
        </div>)}
        <div className="cal-grid">
          {sortedCal.map((it,i)=>(
            <div className="cal-card" key={it.name} style={{animationDelay:i*.04+"s"}}>
              <div className="cal-ctop">
                <span className="cal-cname"><span className={"cal-dot "+(it.imp==="high"?"h":"m")}/>{it.name}</span>
                <span className="cal-when">{untilLabel(it.ni,clock)}</span>
              </div>
              <div className="cal-cgrid">
                <div className="cal-blk">
                  <span className="cal-k">Last · {it.lp}</span>
                  <span className="cal-v">{it.last}
                    {it.sur==="above"&&<span className="chip ab">\u25b2 beat</span>}
                    {it.sur==="below"&&<span className="chip be">\u25bc miss</span>}
                    {it.sur==="inline"&&<span className="chip eq">inline</span>}
                  </span>
                </div>
                <div className="cal-blk">
                  <span className="cal-k">Est · {it.nl}</span>
                  <span className="cal-v" style={{color:"#8892a4"}}>{it.con}</span>
                </div>
              </div>
            </div>
          ))}
        </div>

        {/* TRADE BOOK */}
        <div className="sec">Trade Book</div>
        <div className="trade-grid">
          {TRADES.map((tr,i)=>(
            <div className={"trade-card "+(tr.dir==="LONG"?"long":"short")+" "+(tr.status==="ACTIVE"?"active":"monitoring")}
              key={tr.id} style={{animationDelay:i*.06+"s"}}>
              <div className="trade-top">
                <div className="trade-dir-wrap">
                  <span className={"trade-dir "+(tr.dir==="LONG"?"long":"short")}>{tr.dir}</span>
                  <div>
                    <div className="trade-asset">{tr.asset}</div>
                    <div className="trade-tag">{tr.tag}</div>
                  </div>
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                  <div className="conv">{[1,2,3,4,5].map(n=>(
                    <span key={n} className="conv-star" style={{color:n<=tr.conv?"#FF6200":"rgba(255,255,255,.15)"}}>★</span>
                  ))}</div>
                  <span className={"status-badge "+(tr.status==="ACTIVE"?"active":"monitoring")}>{tr.status}</span>
                </div>
              </div>
              <div className="trade-thesis">{tr.thesis}</div>
              <div className="trade-metrics">
                <div className="tm-blk">
                  <span className="tm-k">Entry</span>
                  <span className="tm-v" style={{fontSize:10,lineHeight:1.3}}>{tr.entry}</span>
                </div>
                <div className="tm-blk">
                  <span className="tm-k">Target</span>
                  <span className="tm-v" style={{color:"#22d3a8",fontSize:10,lineHeight:1.3}}>{tr.target}</span>
                </div>
                <div className="tm-blk">
                  <span className="tm-k">Stop</span>
                  <span className="tm-v" style={{color:"#FF3B55",fontSize:10,lineHeight:1.3}}>{tr.stop}</span>
                </div>
              </div>
              <div className="trade-cat">
                <span style={{color:"#4a5568"}}>Catalyst: </span><span>{tr.catalyst}</span><br/>
                <span style={{color:"#4a5568"}}>Timeline: </span><span>{tr.timeline}</span>
              </div>
              <button className="analyze-btn" onClick={()=>handleAnalyze("trade",null,tr)}>
                \u26a1 Trade Memo
              </button>
            </div>
          ))}
        </div>

        {/* NFP CHART */}
        <div className="sec">NFP History: Surprise vs S&P 500</div>
        <NFPChart/>

        {/* RATES MATRIX */}
        <div className="sec">Rates &amp; Macro Matrix</div>
        <RatesMatrix onAnalyze={handleAnalyze} board={liveBoard}/>

        <div className="foot">
          <span>Data: BLS, Fed, BOJ, ECB, BOE, TradingEconomics · <b>Jun 5–6, 2026</b>. Signals & trade ideas are for analytical purposes only — not investment advice. ~ = estimated.</span>
          <span>\u0394 color: rate\u2191=red(hawkish) · price\u2191=green · CPI\u2191=red · curve\u2191=green · Click rows for AI analysis</span>
        </div>
      </div>
    </div>

    <AnalysisDrawer
      open={!!openA}
      onClose={()=>setOpenA(null)}
      info={openA?.info}
      state={openA&&analyses[openA.key]}
    />
  </>);
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
